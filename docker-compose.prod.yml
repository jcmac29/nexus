version: '3.8'

services:
  # NOTE: PostgreSQL is now managed by DigitalOcean
  # Database: nexus-db-do-user-33766907-0.l.db.ondigitalocean.com:25060

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - nexus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-internal
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - nexus_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  api:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: nexus-api
    environment:
      # Managed PostgreSQL on DigitalOcean
      DATABASE_URL: postgresql+asyncpg://doadmin:${DO_DB_PASSWORD}@${DO_DB_HOST}:25060/nexus?ssl=require
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_BUCKET: nexus-media
      # Multi-tenant settings
      MULTI_TENANT_ENABLED: ${MULTI_TENANT_ENABLED:-false}
      BASE_DOMAIN: ${BASE_DOMAIN:-localhost}
      # Stripe (if enabled)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Admin authentication
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_TOKEN_EXPIRE_HOURS: ${ADMIN_TOKEN_EXPIRE_HOURS:-24}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Frontend URLs (CORS)
      ADMIN_DASHBOARD_URL: ${ADMIN_DASHBOARD_URL:-http://localhost:3001}
      LANDING_URL: ${LANDING_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - nexus-internal
      - nexus-public
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: nexus-admin-dashboard
    networks:
      - nexus-internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: nexus-landing
    networks:
      - nexus-internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - admin-dashboard
      - landing
    networks:
      - nexus-public
      - nexus-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  nexus-internal:
    driver: bridge
  nexus-public:
    driver: bridge

volumes:
  nexus_redis_data:
  nexus_minio_data:
