services:
  db:
    image: pgvector/pgvector:pg16
    container_name: nexus-db
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - nexus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    environment:
      MINIO_ROOT_USER: nexus
      MINIO_ROOT_PASSWORD: nexus-secret-key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - nexus_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: nexus-api
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@db:5432/nexus
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      SECRET_KEY: change-me-in-production
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: nexus
      STORAGE_SECRET_KEY: nexus-secret-key
      STORAGE_BUCKET: nexus-media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./core:/app
    command: uvicorn nexus.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  nexus_postgres_data:
  nexus_redis_data:
  nexus_minio_data:
